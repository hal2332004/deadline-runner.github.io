<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Deadline Runner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
  }
  #game-container {
    position: relative;
    border: 2px solid #00f5ff;
    box-shadow: 0 0 30px #00f5ff44, 0 0 60px #00f5ff22, inset 0 0 30px #00f5ff11;
  }
  #scanline {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 10;
  }
  #ui-overlay {
    position: absolute;
    top: 12px; left: 16px; right: 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    z-index: 20;
    pointer-events: none;
  }
  .score-box {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: #00f5ff;
    text-shadow: 0 0 10px #00f5ff;
    line-height: 1.8;
  }
  .lives-box {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: #ff4466;
    text-shadow: 0 0 10px #ff4466;
    text-align: right;
  }
  #instruction {
    margin-top: 10px;
    color: #ffffff55;
    font-size: 11px;
    letter-spacing: 2px;
    font-family: 'Share Tech Mono', monospace;
  }
  #corner-tl, #corner-tr, #corner-bl, #corner-br {
    position: absolute; width: 16px; height: 16px;
    border-color: #00f5ff; border-style: solid;
    z-index: 30; pointer-events: none;
  }
  #corner-tl { top: -2px; left: -2px; border-width: 3px 0 0 3px; }
  #corner-tr { top: -2px; right: -2px; border-width: 3px 3px 0 0; }
  #corner-bl { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; }
  #corner-br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; }
</style>
</head>
<body>

<div id="game-container">
  <div id="scanline"></div>
  <div id="corner-tl"></div><div id="corner-tr"></div>
  <div id="corner-bl"></div><div id="corner-br"></div>
  <div id="ui-overlay">
    <div class="score-box">
      <div>SCORE</div>
      <div id="score-val">000000</div>
      <div style="margin-top:6px; color:#ffe135; text-shadow:0 0 10px #ffe135;">BEST</div>
      <div id="best-val" style="color:#ffe135; text-shadow:0 0 10px #ffe135;">000000</div>
    </div>
    <div class="lives-box">
      <div>LIVES</div>
      <div id="lives-val">❤️❤️❤️</div>
      <div style="margin-top:6px; color:#ff9500; text-shadow:0 0 10px #ff9500;">WAVE</div>
      <div id="wave-val" style="color:#ff9500; text-shadow:0 0 10px #ff9500;">01</div>
    </div>
  </div>
</div>
<div id="instruction">[ SPACE / TAP ] JUMP &nbsp;·&nbsp; [ ↓ ] DUCK</div>

<script>
const W = Math.min(window.innerWidth - 4, 480);
const H = Math.min(window.innerHeight - 80, 320);
const GROUND = H - 48;

let score = 0, bestScore = 0, lives = 3, wave = 1;
let scoreEl = document.getElementById('score-val');
let bestEl  = document.getElementById('best-val');
let livesEl = document.getElementById('lives-val');
let waveEl  = document.getElementById('wave-val');

function pad(n) { return String(Math.floor(n)).padStart(6,'0'); }

// ── TASK LABELS ──────────────────────────────────────────
const TASKS = [
  { label:'FIX BUG',    priority:'URGENT', color:0xff2244, glow:'#ff2244', speed:1.4, h:38 },
  { label:'REPORT Q1',  priority:'HIGH',   color:0xff7700, glow:'#ff7700', speed:1.1, h:44 },
  { label:'REVIEW PR',  priority:'MEDIUM', color:0xffe135, glow:'#ffe135', speed:0.9, h:38 },
  { label:'MEETING',    priority:'LOW',    color:0x44ff88, glow:'#44ff88', speed:0.7, h:34 },
  { label:'DEPLOY NOW', priority:'URGENT', color:0xff2244, glow:'#ff2244', speed:1.6, h:50 },
  { label:'OVERDUE!!!', priority:'OVERDUE',color:0xff00ff, glow:'#ff00ff', speed:1.8, h:56 },
];

// ── PHASER SCENES ─────────────────────────────────────────
class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }

  create() {
    score = 0; lives = 3; wave = 1;
    this.gameOver = false;
    this.invincible = false;
    this.speed = 3.5;
    this.spawnDelay = 2200;
    this.waveTimer = 0;
    this.ducking = false;

    // BG gradient via graphics
    this.createBG();

    // Ground line
    let gfx = this.add.graphics();
    gfx.lineStyle(2, 0x00f5ff, 0.6);
    gfx.lineBetween(0, GROUND + 36, W, GROUND + 36);
    gfx.lineStyle(1, 0x00f5ff, 0.2);
    gfx.lineBetween(0, GROUND + 40, W, GROUND + 40);

    // Grid lines on floor
    for(let x = 0; x < W; x += 40) {
      gfx.lineStyle(1, 0x00f5ff, 0.08);
      gfx.lineBetween(x, GROUND+36, x - 60, H);
    }

    // Player (drawn as graphics group)
    this.player = this.createPlayer();
    this.playerNormalY = GROUND - 2;
    this.player.y = this.playerNormalY;
    this.playerDuckH = 22;
    this.playerNormalH = 36;
    this.isJumping = false;

    // Obstacle group
    this.obstacles = this.add.group();

    // Particles (neon sparks)
    this.sparks = [];

    // Score ticker
    this.scoreTimer = this.time.addEvent({
      delay: 100, loop: true,
      callback: () => { if(!this.gameOver){ score += wave; this.updateHUD(); }}
    });

    // Spawn timer
    this.spawnTimer = this.time.addEvent({
      delay: this.spawnDelay, loop: true,
      callback: this.spawnObstacle, callbackScope: this
    });

    // Wave escalation
    this.waveEvent = this.time.addEvent({
      delay: 12000, loop: true,
      callback: () => {
        wave++; this.speed += 0.4; this.spawnDelay = Math.max(900, this.spawnDelay - 200);
        this.spawnTimer.delay = this.spawnDelay;
        this.showWaveText();
        this.updateHUD();
      }
    });

    // Input
    this.input.keyboard.on('keydown-SPACE', this.jump, this);
    this.input.keyboard.on('keydown-UP',    this.jump, this);
    this.input.keyboard.on('keydown-DOWN',  this.duck, this);
    this.input.keyboard.on('keyup-DOWN',    this.unduck, this);
    this.input.on('pointerdown', (p) => {
      if(p.y < H * 0.7) this.jump(); else this.duck();
    });
    this.input.on('pointerup', this.unduck, this);

    // Running animation counter
    this.runFrame = 0;
    this.runTimer = this.time.addEvent({
      delay: 120, loop: true,
      callback: () => { this.runFrame = (this.runFrame+1)%4; this.drawPlayer(); }
    });

    // Background stars
    this.stars = [];
    for(let i = 0; i < 40; i++) {
      this.stars.push({
        x: Phaser.Math.Between(0, W),
        y: Phaser.Math.Between(0, GROUND - 20),
        s: Math.random() * 1.5 + 0.3,
        spd: Math.random() * 0.5 + 0.1,
        alpha: Math.random()
      });
    }
    this.starGfx = this.add.graphics();

    this.updateHUD();
    this.showStartBanner();
  }

  createBG() {
    let bg = this.add.graphics();
    // Deep space gradient approximation
    for(let y = 0; y < H; y += 4) {
      let t = y / H;
      let r = Math.floor(10 + t * 5);
      let g = Math.floor(10 + t * 8);
      let b = Math.floor(20 + t * 25);
      bg.fillStyle(Phaser.Display.Color.GetColor(r, g, b), 1);
      bg.fillRect(0, y, W, 4);
    }
    // Horizon glow
    let glow = this.add.graphics();
    glow.fillGradientStyle(0x001a33, 0x001a33, 0x003366, 0x003366, 0.0, 0.0, 0.5, 0.5);
    glow.fillRect(0, GROUND - 40, W, 80);
  }

  createPlayer() {
    let c = this.add.graphics();
    c.x = 80; c.y = GROUND - 2;
    this.playerGfx = c;
    this.drawPlayer();
    return c;
  }

  drawPlayer() {
    let g = this.playerGfx;
    g.clear();
    let dh = this.ducking ? this.playerDuckH : this.playerNormalH;
    let dw = this.ducking ? 30 : 22;
    let frame = this.runFrame;

    // Body glow
    g.fillStyle(0x00f5ff, 0.15);
    g.fillRoundedRect(-dw/2 - 4, -dh - 4, dw + 8, dh + 8, 6);

    // Body
    g.fillStyle(0x00f5ff, 1);
    g.fillRoundedRect(-dw/2, -dh, dw, dh, 4);

    // Inner body darker
    g.fillStyle(0x003344, 1);
    g.fillRoundedRect(-dw/2 + 3, -dh + 4, dw - 6, dh - 8, 3);

    // Eyes / visor
    g.fillStyle(0x00f5ff, 1);
    if(!this.ducking) {
      g.fillRect(-7, -dh + 6, 14, 5);
      // Scan line on visor
      g.fillStyle(0xffffff, 0.3);
      g.fillRect(-7, -dh + 7, 14, 2);
    }

    // Legs animation
    if(!this.ducking) {
      let legOffset = [0, 4, 0, -4][frame];
      g.fillStyle(0x00ccdd, 1);
      g.fillRect(-8, 0, 6, 10 + legOffset);
      g.fillRect(2, 0, 6, 10 - legOffset);
      // Feet
      g.fillStyle(0x00f5ff, 1);
      g.fillRect(-10, 8 + legOffset, 8, 4);
      g.fillRect(0, 8 - legOffset, 8, 4);
    }

    // Arms
    if(!this.ducking) {
      let armSwing = [3, 0, -3, 0][frame];
      g.fillStyle(0x00ccdd, 1);
      g.fillRect(-dw/2 - 6, -dh + 10 + armSwing, 6, 4);
      g.fillRect(dw/2, -dh + 10 - armSwing, 6, 4);
    }
  }

  jump() {
    if(this.gameOver) { this.scene.start('GameScene'); return; }
    if(!this.isJumping) {
      this.isJumping = true;
      this.tweens.add({
        targets: this.playerGfx,
        y: this.playerNormalY - 90,
        duration: 320,
        ease: 'Quad.easeOut',
        yoyo: true,
        onComplete: () => { this.isJumping = false; this.playerGfx.y = this.playerNormalY; }
      });
    }
  }

  duck() {
    if(this.gameOver) return;
    this.ducking = true;
    this.playerGfx.y = this.playerNormalY + 14;
    this.drawPlayer();
  }

  unduck() {
    this.ducking = false;
    this.playerGfx.y = this.playerNormalY;
    this.drawPlayer();
  }

  spawnObstacle() {
    if(this.gameOver) return;
    let taskDef = TASKS[Phaser.Math.Between(0, TASKS.length - 1)];
    // Higher wave = more urgents
    if(wave >= 3 && Math.random() < 0.3) taskDef = TASKS[0];
    if(wave >= 5 && Math.random() < 0.2) taskDef = TASKS[5];

    let tw = 90 + taskDef.label.length * 4;
    let th = taskDef.h;
    // Random height: ground level or floating (jump required)
    let yOpts = [GROUND - th/2, GROUND - th/2 - 60, GROUND - th/2 - 30];
    let ty = yOpts[Phaser.Math.Between(0, yOpts.length - 1)];
    // Occasionally ground level low obstacle (duck required)
    if(Math.random() < 0.15 && !this.isJumping) {
      ty = GROUND - 12; th = 18;
    }

    let ob = this.add.graphics();
    ob.x = W + tw;
    ob.y = ty;
    ob._tw = tw;
    ob._th = th;
    ob._def = taskDef;
    ob._speed = this.speed * taskDef.speed;
    ob._labelY = ty;

    this.drawObstacle(ob);

    // Label text
    let lbl = this.add.text(ob.x, ty - th/2 - 4, taskDef.label, {
      fontFamily: "'Press Start 2P'",
      fontSize: '6px',
      color: '#' + taskDef.color.toString(16).padStart(6,'0'),
      stroke: '#000000', strokeThickness: 3
    }).setOrigin(0.5, 1);
    let pri = this.add.text(ob.x, ty + th/2 + 4, taskDef.priority, {
      fontFamily: "'Share Tech Mono'",
      fontSize: '8px',
      color: '#ffffff88',
    }).setOrigin(0.5, 0);

    ob._lbl = lbl;
    ob._pri = pri;
    this.obstacles.add(ob);
  }

  drawObstacle(ob) {
    let {_tw:tw, _th:th, _def:def} = ob;
    ob.clear();
    // Glow
    ob.fillStyle(def.color, 0.12);
    ob.fillRoundedRect(-tw/2 - 6, -th/2 - 6, tw + 12, th + 12, 8);
    // Main box
    ob.lineStyle(2, def.color, 1);
    ob.strokeRoundedRect(-tw/2, -th/2, tw, th, 4);
    ob.fillStyle(def.color, 0.18);
    ob.fillRoundedRect(-tw/2, -th/2, tw, th, 4);
    // Scanline on obstacle
    ob.fillStyle(0xffffff, 0.05);
    for(let y = -th/2; y < th/2; y += 6) {
      ob.fillRect(-tw/2, y, tw, 2);
    }
    // Corner marks
    ob.lineStyle(2, def.color, 1);
    ob.beginPath(); ob.moveTo(-tw/2, -th/2 + 8); ob.lineTo(-tw/2, -th/2); ob.lineTo(-tw/2 + 8, -th/2);
    ob.beginPath(); ob.moveTo(tw/2 - 8, -th/2); ob.lineTo(tw/2, -th/2); ob.lineTo(tw/2, -th/2 + 8);
    ob.strokePath();
  }

  update(time, delta) {
    if(this.gameOver) return;

    // Move stars
    this.starGfx.clear();
    this.stars.forEach(s => {
      s.x -= s.spd * (this.speed / 3.5);
      if(s.x < 0) { s.x = W; s.y = Phaser.Math.Between(0, GROUND - 20); }
      s.alpha = 0.3 + Math.sin(time * 0.002 + s.x) * 0.3;
      this.starGfx.fillStyle(0xffffff, s.alpha);
      this.starGfx.fillRect(s.x, s.y, s.s, s.s);
    });

    // Move obstacles
    this.obstacles.getChildren().forEach(ob => {
      ob.x -= ob._speed * (delta / 16);
      ob._lbl.x = ob.x;
      ob._pri.x = ob.x;

      // Check collision
      if(!this.invincible && !this.gameOver) {
        let px = this.playerGfx.x;
        let py = this.playerGfx.y;
        let pdh = this.ducking ? this.playerDuckH : this.playerNormalH;
        let pdw = 22;
        if(
          Math.abs(ob.x - px) < ob._tw/2 + pdw/2 - 8 &&
          Math.abs(ob.y - py + pdh/2) < ob._th/2 + pdh/2 - 8
        ) {
          this.hit(ob);
        }
      }

      if(ob.x < -120) {
        ob._lbl.destroy();
        ob._pri.destroy();
        ob.destroy();
      }
    });

    // Emit trail sparks
    if(Math.random() < 0.3) {
      this.emitSpark(this.playerGfx.x - 12, this.playerGfx.y);
    }
    this.updateSparks(delta);
  }

  hit(ob) {
    lives--;
    this.invincible = true;
    this.updateHUD();

    // Flash player red
    this.tweens.add({
      targets: this.playerGfx,
      alpha: { from: 1, to: 0.2 },
      duration: 80, yoyo: true, repeat: 5,
      onComplete: () => { this.playerGfx.alpha = 1; this.invincible = false; }
    });

    // Explosion sparks at obstacle
    for(let i = 0; i < 16; i++) this.emitExplosion(ob.x, ob.y, ob._def.color);
    this.cameras.main.shake(200, 0.012);
    ob._lbl.destroy(); ob._pri.destroy(); ob.destroy();

    if(lives <= 0) this.triggerGameOver();
  }

  triggerGameOver() {
    this.gameOver = true;
    if(score > bestScore) bestScore = score;
    this.updateHUD();
    this.scoreTimer.remove();
    this.spawnTimer.remove();
    this.waveEvent.remove();
    this.runTimer.remove();

    // Stop all obstacles
    this.obstacles.getChildren().forEach(ob => { ob._speed = 0; });

    // Big flash
    let flash = this.add.graphics();
    flash.fillStyle(0xff2244, 1);
    flash.fillRect(0, 0, W, H);
    flash.alpha = 0.6;
    this.tweens.add({ targets: flash, alpha: 0, duration: 400 });

    // Game over overlay
    this.time.delayedCall(300, () => {
      let ov = this.add.graphics();
      ov.fillStyle(0x000000, 0.85);
      ov.fillRect(W/2 - 140, H/2 - 80, 280, 160);
      ov.lineStyle(2, 0xff2244, 1);
      ov.strokeRect(W/2 - 140, H/2 - 80, 280, 160);

      this.add.text(W/2, H/2 - 55, 'GAME OVER', {
        fontFamily: "'Press Start 2P'", fontSize: '18px',
        color: '#ff2244', stroke: '#000', strokeThickness: 4
      }).setOrigin(0.5);

      this.add.text(W/2, H/2 - 20, `SCORE: ${pad(score)}`, {
        fontFamily: "'Press Start 2P'", fontSize: '10px', color: '#00f5ff'
      }).setOrigin(0.5);

      this.add.text(W/2, H/2 + 5, `BEST:  ${pad(bestScore)}`, {
        fontFamily: "'Press Start 2P'", fontSize: '10px', color: '#ffe135'
      }).setOrigin(0.5);

      this.add.text(W/2, H/2 + 40, '▶  RETRY', {
        fontFamily: "'Press Start 2P'", fontSize: '10px',
        color: '#ffffff', stroke: '#000', strokeThickness: 3
      }).setOrigin(0.5).setInteractive({ useHandCursor: true })
        .on('pointerdown', () => this.scene.start('GameScene'))
        .on('pointerover', function(){ this.setColor('#00f5ff'); })
        .on('pointerout',  function(){ this.setColor('#ffffff'); });
    });
  }

  showStartBanner() {
    let ban = this.add.graphics();
    ban.fillStyle(0x000000, 0.8);
    ban.fillRect(W/2 - 150, H/2 - 70, 300, 140);
    ban.lineStyle(2, 0x00f5ff, 1);
    ban.strokeRect(W/2 - 150, H/2 - 70, 300, 140);

    this.add.text(W/2, H/2 - 48, '⚡ DEADLINE RUNNER', {
      fontFamily: "'Press Start 2P'", fontSize: '11px',
      color: '#00f5ff', stroke: '#003344', strokeThickness: 4
    }).setOrigin(0.5);

    this.add.text(W/2, H/2 - 14, 'Né deadline trước khi\nchúng đuổi kịp bạn!', {
      fontFamily: "'Share Tech Mono'", fontSize: '12px',
      color: '#ffffffbb', align: 'center'
    }).setOrigin(0.5);

    let go = this.add.text(W/2, H/2 + 36, 'SPACE / TAP ĐỂ BẮT ĐẦU', {
      fontFamily: "'Press Start 2P'", fontSize: '8px', color: '#ffe135'
    }).setOrigin(0.5);

    this.tweens.add({ targets: go, alpha: 0, duration: 500, yoyo: true, repeat: -1 });

    this.input.once('pointerdown', () => {
      ban.destroy(); go.destroy();
      this.children.list.filter(c => c.type === 'Text' && c !== go).forEach(t => {
        if(t.text.includes('DEADLINE RUNNER') || t.text.includes('Né deadline') || t.text.includes('SPACE')) t.destroy();
      });
    });
    this.input.keyboard.once('keydown-SPACE', () => {
      ban.destroy(); go.destroy();
    });
  }

  showWaveText() {
    let txt = this.add.text(W/2, H/2, `WAVE ${wave}`, {
      fontFamily: "'Press Start 2P'", fontSize: '24px',
      color: '#ff9500', stroke: '#000', strokeThickness: 6
    }).setOrigin(0.5).setAlpha(0);
    this.tweens.add({
      targets: txt, alpha: { from: 0, to: 1 },
      duration: 200, hold: 800,
      yoyo: true,
      onComplete: () => txt.destroy()
    });
  }

  emitSpark(x, y) {
    this.sparks.push({
      x, y: y - 18,
      vx: (Math.random() - 0.5) * 2,
      vy: -Math.random() * 1.5,
      life: 0.8, maxLife: 0.8,
      color: 0x00f5ff
    });
  }

  emitExplosion(x, y, color) {
    for(let i = 0; i < 1; i++) {
      let angle = Math.random() * Math.PI * 2;
      let speed = Math.random() * 5 + 2;
      this.sparks.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1, maxLife: 1, color
      });
    }
  }

  updateSparks(delta) {
    // Use a graphics object for sparks
    if(!this.sparkGfx) this.sparkGfx = this.add.graphics();
    this.sparkGfx.clear();
    this.sparks = this.sparks.filter(s => s.life > 0);
    this.sparks.forEach(s => {
      s.x += s.vx; s.y += s.vy; s.vy += 0.1;
      s.life -= delta / 600;
      let a = Math.max(0, s.life / s.maxLife);
      this.sparkGfx.fillStyle(s.color, a);
      this.sparkGfx.fillRect(s.x - 2, s.y - 2, 4, 4);
    });
  }

  updateHUD() {
    scoreEl.textContent = pad(score);
    bestEl.textContent  = pad(bestScore);
    waveEl.textContent  = String(wave).padStart(2,'0');
    const hearts = ['', '❤️', '❤️❤️', '❤️❤️❤️'];
    livesEl.textContent = lives > 0 ? (hearts[Math.min(lives,3)] || '💀') : '💀';
  }
}

// ── PHASER CONFIG ─────────────────────────────────────────
const config = {
  type: Phaser.AUTO,
  width: W,
  height: H,
  backgroundColor: '#0a0a14',
  parent: 'game-container',
  scene: [GameScene],
  scale: {
    mode: Phaser.Scale.NONE,
    autoCenter: Phaser.Scale.CENTER_BOTH
  },
  input: {
    keyboard: true,
    touch: true
  }
};

const game = new Phaser.Game(config);

// Resize canvas border box
document.getElementById('game-container').style.width  = W + 'px';
document.getElementById('game-container').style.height = H + 'px';
</script>
</body>
</html>
